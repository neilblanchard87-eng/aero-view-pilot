<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AERO-VIEW | Pilot App v1.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at 50% 0%, #1e293b, #000); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .neon-text { text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">AERO<span class="text-cyan-400">VIEW</span></h1>
                <p class="text-[9px] font-mono text-cyan-400/50 tracking-[0.3em] mt-1">SENSORY_LINK_v1.6</p>
            </div>
            <div id="gps-status" class="text-[10px] font-bold text-red-500 uppercase tracking-tighter">GPS: OFFLINE</div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass p-6 rounded-[2rem] text-center border-t border-white/10">
                <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Velocity</p>
                <p id="live-speed" class="text-4xl font-black text-cyan-400 neon-text">0</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase">MPH</p>
            </div>
            <div class="glass p-6 rounded-[2rem] text-center border-t border-white/10">
                <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Steering</p>
                <p id="live-tilt" class="text-4xl font-black text-white italic">0°</p>
                <p class="text-[10px] font-bold text-gray-400 uppercase">ACTIVE_ROLL</p>
            </div>
        </div>

        <div class="space-y-4 mb-10">
            <button id="init-btn" class="w-full py-5 glass border-cyan-400/30 rounded-2xl text-xs font-black tracking-[0.3em] text-cyan-400 active:scale-95 transition-all">
                INITIALIZE SENSOR ARRAY
            </button>
            <div class="grid grid-cols-2 gap-4">
                <button id="color-cyan" class="py-4 glass rounded-2xl border-b-2 border-cyan-500 text-[10px] font-black uppercase">Cyan Mode</button>
                <button id="color-pink" class="py-4 glass rounded-2xl border-b-2 border-pink-500 text-[10px] font-black uppercase">Pink Mode</button>
            </div>
        </div>

        <div class="glass p-4 rounded-2xl font-mono text-[10px] text-gray-500">
            <p id="console-title" class="text-cyan-400 mb-2 uppercase tracking-widest border-b border-white/5 pb-1">Telemetry Stream</p>
            <div id="console-out" class="space-y-1 h-20 overflow-y-auto">
                <p>> System Standby. Awaiting Auth...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJgr9zdA4j1U-50b9TRfsoqrE3pIxmee4",
            authDomain: "aero-view-alpha.firebaseapp.com",
            projectId: "aero-view-alpha",
            storageBucket: "aero-view-alpha.firebasestorage.app",
            messagingSenderId: "239183849355",
            appId: "1:239183849355:web:5d19770237b2565148718e",
            measurementId: "G-E3CNWW9JJB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const log = (msg) => {
            const out = document.getElementById('console-out');
            out.innerHTML += `<p>> ${msg}</p>`;
            out.scrollTop = out.scrollHeight;
        };

        document.getElementById('color-cyan').addEventListener('click', () => updateDoc(doc(db, "settings", "hud_config"), { color: '#00FFFF' }));
        document.getElementById('color-pink').addEventListener('click', () => updateDoc(doc(db, "settings", "hud_config"), { color: '#FF007F' }));

        document.getElementById('init-btn').addEventListener('click', async () => {
            log("Initializing Dynamic Sensors...");
            if (navigator.vibrate) navigator.vibrate(50);

            // Request Motion/Orientation Permissions
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response !== 'granted') { log("Orientation Denied."); return; }
            }

            // A. TILT (STEERING) TRACKING
            window.addEventListener('deviceorientation', (event) => {
                const tilt = Math.round(event.gamma); // Roll (Left/Right tilt)
                document.getElementById('live-tilt').innerText = `${tilt}°`;
                
                // Throttle cloud updates
                if (Date.now() % 4 === 0) {
                    updateDoc(doc(db, "settings", "hud_config"), { steering_tilt: tilt });
                }
            });

            // B. G-FORCE TRACKING
            window.addEventListener('devicemotion', (event) => {
                const gx = event.accelerationIncludingGravity.x || 0;
                const gy = event.accelerationIncludingGravity.y || 0;
                if (Date.now() % 6 === 0) {
                    updateDoc(doc(db, "settings", "hud_config"), { g_x: gx, g_y: gy });
                }
            });

            // C. GPS TRACKING
            navigator.geolocation.watchPosition(async (position) => {
                document.getElementById('gps-status').innerText = "GPS: ACTIVE";
                const speedMPH = Math.round((position.coords.speed || 0) * 2.23694);
                document.getElementById('live-speed').innerText = speedMPH;
                updateDoc(doc(db, "settings", "hud_config"), { gps_speed: speedMPH });
            }, null, { enableHighAccuracy: true });

            document.getElementById('init-btn').innerText = "ACTIVE_MISSION";
            document.getElementById('init-btn').className = "w-full py-5 glass border-green-500/30 rounded-2xl text-xs font-black tracking-[0.3em] text-green-500 pointer-events-none opacity-50";
        });
    </script>
</body>
</html>
