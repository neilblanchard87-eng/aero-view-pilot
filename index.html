<!DOCTYPE html>
<html lang="en" data-theme="cyan">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aero-Pilot UK v9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00F0FF; --glow: rgba(0, 240, 255, 0.4); }
        [data-theme="stealth"] { --accent: #FF0000; --glow: rgba(255, 0, 0, 0.4); }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glow-accent { text-shadow: 0 0 25px var(--glow); color: var(--accent) !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hidden { display: none; }
        .nav-btn { opacity: 0.3; font-size: 7px; font-weight: 900; text-transform: uppercase; transition: 0.3s; }
        .scan-overlay { border: 2px dashed var(--accent); position: absolute; top: 20%; left: 10%; width: 80%; height: 40%; pointer-events: none; }
        .result-green { color: #22c55e; border-color: #22c55e; }
        .result-red { color: #ef4444; border-color: #ef4444; }
    </style>
</head>
<body class="h-screen flex flex-col justify-between relative">

    <div class="p-4 flex justify-between items-center z-50 bg-black/50 backdrop-blur-md border-b border-white/5">
        <div class="flex flex-col">
            <span class="text-[8px] font-black tracking-[0.4em] glow-accent uppercase italic">Aero_Vision_UK</span>
            <span id="current-time" class="text-[10px] font-bold text-white/60">18:21 SUN</span>
        </div>
        <div class="flex items-center gap-3">
             <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
             <span class="text-[8px] font-black tracking-widest opacity-40 uppercase">System_Live</span>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto px-6 pb-28">
        
        <section id="page-drive" class="pt-10 text-center space-y-6">
            <div class="text-[100px] font-black italic leading-none glow-accent" id="speed-val">00</div>
            <div class="text-[9px] font-black tracking-[0.5em] opacity-40 uppercase">MPH</div>
        </section>

        <section id="page-vision" class="hidden space-y-4 pt-6 text-center">
            <h2 class="text-xl font-black italic tracking-tighter uppercase">Sign_Interpreter</h2>
            
            <div class="relative w-full aspect-square rounded-3xl overflow-hidden glass-panel border border-white/10">
                <video id="dashcam-feed" autoplay muted playsinline class="w-full h-full object-cover"></video>
                <div class="scan-overlay animate-pulse"></div>
                
                <div id="scan-result" class="hidden absolute inset-0 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center">
                    <div id="result-status" class="text-2xl font-black italic mb-2">SCANNING...</div>
                    <p id="result-detail" class="text-[10px] tracking-widest opacity-60 uppercase">Analysing_UK_Restrictions</p>
                    <button onclick="closeScan()" class="mt-8 text-[8px] font-black tracking-widest opacity-40 uppercase border-b border-white/20 pb-1">Dismiss</button>
                </div>
            </div>

            <button onclick="interpretSign()" class="w-full py-6 rounded-[2rem] bg-white text-black font-black uppercase tracking-widest text-[10px] shadow-xl">
                Scan_Parking_Sign
            </button>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full h-20 glass-panel border-t border-white/10 flex justify-around items-center px-4 pb-4 z-50">
        <button onclick="showPage('drive')" id="nav-drive" class="nav-btn flex flex-col items-center gap-1"><span>Drive</span></button>
        <button onclick="showPage('vision')" id="nav-vision" class="nav-btn flex flex-col items-center gap-1"><span>Vision</span></button>
    </nav>

            document.getElementById('current-time').innerText = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')} ${days[now.getDay()]}`;
        }, 1000);
