<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AERO-VIEW | Pilot App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at 50% 0%, #1e293b, #000); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .active-tab { background: #22d3ee; color: #000; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">AERO<span class="text-cyan-400">VIEW</span></h1>
                <p class="text-[9px] font-mono text-cyan-400/50 tracking-[0.3em] mt-1">TELEMETRY_LINK_ACTIVE</p>
            </div>
            <div id="gps-status" class="text-[10px] font-bold text-red-500 uppercase">GPS: OFFLINE</div>
        </header>

        <div class="flex p-1 mb-8 glass rounded-2xl">
            <button onclick="switchTab('controls')" id="btn-controls" class="flex-1 py-3 rounded-xl text-xs font-black tracking-widest transition-all active-tab">CONTROLS</button>
            <button onclick="switchTab('logs')" id="btn-logs" class="flex-1 py-3 rounded-xl text-xs font-black tracking-widest text-gray-500 transition-all">LOGS</button>
        </div>

        <div id="tab-controls" class="space-y-6">
            <div class="glass p-6 rounded-[2rem]">
                <h2 class="text-[10px] font-mono text-gray-500 mb-6 uppercase tracking-[0.2em]">Select HUD Signature</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="updateColor('#00FFFF')" class="flex flex-col items-center p-4 glass rounded-2xl border-t border-white/10 active:scale-95 transition-transform">
                        <div class="w-full h-8 bg-[#00FFFF] rounded-lg mb-2 shadow-[0_0_15px_rgba(0,255,255,0.4)]"></div>
                        <span class="text-[10px] font-bold tracking-widest">CYAN</span>
                    </button>
                    <button onclick="updateColor('#FF007F')" class="flex flex-col items-center p-4 glass rounded-2xl border-t border-white/10 active:scale-95 transition-transform">
                        <div class="w-full h-8 bg-[#FF007F] rounded-lg mb-2 shadow-[0_0_15px_rgba(255,0,127,0.4)]"></div>
                        <span class="text-[10px] font-bold tracking-widest">PINK</span>
                    </button>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem] grid grid-cols-2 gap-4">
                <div class="text-center">
                    <p class="text-[9px] text-gray-500 uppercase tracking-widest">GPS Speed</p>
                    <p id="live-speed" class="text-2xl font-black text-cyan-400">0 <span class="text-xs text-white">MPH</span></p>
                </div>
                <div class="text-center">
                    <p class="text-[9px] text-gray-500 uppercase tracking-widest">Heading</p>
                    <p id="live-heading" class="text-2xl font-black text-white">---°</p>
                </div>
            </div>

            <button onclick="requestTelemetry()" class="w-full py-4 glass border-cyan-400/30 rounded-2xl text-xs font-black tracking-[0.3em] text-cyan-400 animate-pulse">
                INITIALIZE SENSOR LINK
            </button>
        </div>

        <div id="tab-logs" class="hidden space-y-4">
             <div id="log-container" class="space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJgr9zdA4j1U-50b9TRfsoqrE3pIxmee4",
            authDomain: "aero-view-alpha.firebaseapp.com",
            projectId: "aero-view-alpha",
            storageBucket: "aero-view-alpha.firebasestorage.app",
            messagingSenderId: "239183849355",
            appId: "1:239183849355:web:5d19770237b2565148718e",
            measurementId: "G-E3CNWW9JJB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Update HUD Config
        window.updateColor = async (hex) => {
            await updateDoc(doc(db, "settings", "hud_config"), { color: hex });
        };

        // TELEMETRY ENGINE
        window.requestTelemetry = () => {
            if ("geolocation" in navigator) {
                document.getElementById('gps-status').innerText = "GPS: SYNCING";
                document.getElementById('gps-status').className = "text-[10px] font-bold text-cyan-400 uppercase";
                
                navigator.geolocation.watchPosition(async (position) => {
                    const speed = position.coords.speed ? Math.round(position.coords.speed * 2.23694) : 0; // Convert m/s to mph
                    const heading = position.coords.heading || 0;
                    
                    document.getElementById('live-speed').innerHTML = `${speed} <span class="text-xs text-white">MPH</span>`;
                    document.getElementById('live-heading').innerText = `${Math.round(heading)}°`;

                    // Push to Firebase
                    await updateDoc(doc(db, "settings", "hud_config"), { 
                        gps_speed: speed,
                        heading: heading
                    });
                }, (err) => console.error(err), { enableHighAccuracy: true });
            }
        };

        window.switchTab = (tab) => {
            document.getElementById('tab-controls').classList.toggle('hidden', tab !== 'controls');
            document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
            document.getElementById('btn-controls').classList.toggle('active-tab', tab === 'controls');
            document.getElementById('btn-logs').classList.toggle('active-tab', tab === 'logs');
        };
    </script>
</body>
</html>
