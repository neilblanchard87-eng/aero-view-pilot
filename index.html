<!DOCTYPE html>
<html lang="en" data-theme="cyan">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aero-Pilot Omni-OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00F0FF; --glow: rgba(0, 240, 255, 0.4); }
        [data-theme="stealth"] { --accent: #FF0000; --glow: rgba(255, 0, 0, 0.4); }

        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glow-accent { text-shadow: 0 0 25px var(--glow); color: var(--accent) !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hidden { display: none; }
        .nav-btn { opacity: 0.3; font-size: 7px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; transition: 0.3s; }
        .accent-border { border-color: var(--accent); }
        .accent-bg { background-color: var(--accent); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .critical-btn { background: #ef4444; color: white; animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="h-screen flex flex-col justify-between relative">

    <div class="p-4 flex justify-between items-center z-50 bg-black/50 backdrop-blur-md border-b border-white/5">
        <div class="flex flex-col">
            <span class="text-[8px] font-black tracking-[0.4em] glow-accent uppercase italic">Aero_Pilot_Omni_v7.0</span>
            <span id="header-status" class="text-[9px] font-bold text-white/40 uppercase">System_Active</span>
        </div>
        <button onclick="toggleStealth()" class="glass-panel px-4 py-2 rounded-full border accent-border flex items-center gap-2 active:scale-90 transition-all">
            <div class="w-1.5 h-1.5 rounded-full accent-bg"></div>
            <span class="text-[8px] font-black tracking-widest uppercase">Stealth</span>
        </button>
    </div>

    <main class="flex-1 overflow-y-auto px-6 pb-28">
        
        <section id="page-drive" class="space-y-6 pt-4 text-center">
            <div class="py-10">
                <div class="text-[100px] font-black italic leading-none glow-accent" id="speed-val">00</div>
                <div class="text-[9px] font-black tracking-[0.5em] opacity-40 uppercase">MPH</div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="glass-panel p-4 rounded-2xl">
                    <span class="text-[8px] font-black text-white/20 uppercase tracking-widest">Lat_G</span>
                    <div id="lat-g" class="text-xl font-bold italic">0.00</div>
                </div>
                <div class="glass-panel p-4 rounded-2xl">
                    <span class="text-[8px] font-black text-white/20 uppercase tracking-widest">Lon_G</span>
                    <div id="lon-g" class="text-xl font-bold italic">0.00</div>
                </div>
            </div>
        </section>

        <section id="page-parking" class="hidden space-y-6 pt-6 text-center">
            <h2 class="text-xl font-black italic tracking-tighter uppercase">Parking_Control</h2>
            <div id="timer-display" class="text-6xl font-black italic glow-accent py-10">00:00</div>
            <button id="nav-to-car" onclick="findMyCar()" class="w-full glass-panel py-4 rounded-xl opacity-20 pointer-events-none text-[9px] font-black tracking-widest uppercase">Navigate_To_Car</button>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="addTime(30)" class="glass-panel py-4 rounded-xl font-bold text-xs">+30m</button>
                <button id="parking-btn" onclick="toggleParking()" class="bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase">Set_Meter</button>
            </div>
        </section>

        <section id="page-fuel" class="hidden space-y-6 pt-6">
            <h2 class="text-xl font-black italic tracking-tighter uppercase text-center">Voyage_Estimator</h2>
            <div class="glass-panel p-6 rounded-2xl space-y-4">
                <input type="number" id="input-dist" placeholder="Trip Distance (MI)" />
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="input-mpg" value="25" />
                    <input type="number" id="input-price" value="4.50" step="0.01" />
                </div>
                <button onclick="calcFuel()" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase">Calculate_Cost</button>
            </div>
            <div id="fuel-result" class="text-center text-4xl font-black glow-accent"></div>
        </section>

        <section id="page-vault" class="hidden space-y-4 pt-6">
            <h2 class="text-xl font-black italic tracking-tighter uppercase text-center">Maintenance_Vault</h2>
            <div class="glass-panel p-6 rounded-2xl border-l-4 accent-border">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[9px] font-black opacity-60 uppercase tracking-widest">Oil_Life</span>
                    <span id="oil-pct" class="text-xs font-bold">100%</span>
                </div>
                <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                    <div id="oil-bar" class="h-full accent-bg transition-all duration-1000" style="width: 100%"></div>
                </div>
            </div>
            <button id="find-mechanic" onclick="findNearestRepair()" class="hidden w-full py-5 rounded-2xl critical-btn font-black text-[10px] uppercase tracking-widest">Find_Service_Nexus</button>
        </section>

        <section id="page-vision" class="hidden space-y-4 pt-6 text-center">
            <h2 class="text-xl font-black italic tracking-tighter uppercase">Aero_Vision</h2>
            <div class="relative w-full aspect-video rounded-2xl overflow-hidden glass-panel border border-white/10">
                <video id="dashcam-feed" autoplay muted playsinline class="w-full h-full object-cover"></video>
                <div class="absolute top-4 right-4 flex items-center gap-2">
                    <div class="w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
                    <span class="text-[8px] font-black uppercase">Recording</span>
                </div>
            </div>
        </section>

        <section id="page-adrenaline" class="hidden space-y-6 pt-6 text-center">
            <h2 class="text-xl font-black italic tracking-tighter uppercase">Performance_Lab</h2>
            <div class="glass-panel p-10 rounded-[3rem]">
                <div id="perf-timer" class="text-7xl font-black italic glow-accent">00.00</div>
                <div id="perf-status" class="text-[8px] font-bold opacity-30 uppercase tracking-[0.4em] mt-4">Stop_To_Arm</div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full h-20 glass-panel border-t border-white/10 flex justify-around items-center px-2 pb-2 z-50">
        <button onclick="showPage('drive')" id="nav-drive" class="nav-btn flex flex-col items-center gap-1"><span>Drive</span></button>
        <button onclick="showPage('parking')" id="nav-parking" class="nav-btn flex flex-col items-center gap-1"><span>Park</span></button>
        <button onclick="showPage('fuel')" id="nav-fuel" class="nav-btn flex flex-col items-center gap-1"><span>Fuel</span></button>
        <button onclick="showPage('vault')" id="nav-vault" class="nav-btn flex flex-col items-center gap-1"><span>Vault</span></button>
        <button onclick="showPage('vision')" id="nav-vision" class="nav-btn flex flex-col items-center gap-1"><span>Vision</span></button>
        <button onclick="showPage('adrenaline')" id="nav-adrenaline" class="nav-btn flex flex-col items-center gap-1"><span>Race</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBJgr9zdA4j1U-50b9TRfsoqrE3pIxmee4", authDomain: "aero-view-alpha.firebaseapp.com", projectId: "aero-view-alpha" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const hudRef = doc(db, "settings", "hud_config");

        let odo = 0, lastPos = null, parkedPos = null;
        let tSeconds = 0, tInterval = null;
        let perf = { timing: false, start: null };

        // 1. NAVIGATION
        window.showPage = (id) => {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.style.opacity = '0.3');
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.getElementById(`nav-${id}`).style.opacity = '1';
            if(id === 'vision') startDashcam();
        };
        showPage('drive');

        // 2. STEALTH MODE
        window.toggleStealth = () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'cyan' ? 'stealth' : 'cyan';
            document.documentElement.setAttribute('data-theme', next);
            speak(`Stealth mode ${next === 'stealth' ? 'engaged' : 'disengaged'}`);
            updateDoc(hudRef, { theme: next });
        };

        // 3. PERFORMANCE TIMER
        function handlePerf(mph) {
            const display = document.getElementById('perf-timer');
            const status = document.getElementById('perf-status');
            if (mph === 0 && !perf.timing) { status.innerText = "Launch_Ready"; }
            else if (mph > 1 && mph < 60 && !perf.timing && !perf.start) {
                perf.timing = true; perf.start = performance.now();
                speak("Timer active. Go.");
            } else if (mph >= 60 && perf.timing) {
                const time = ((performance.now() - perf.start) / 1000).toFixed(2);
                perf.timing = false; display.innerText = `${time}s`;
                speak(`Run complete. ${time} seconds.`);
                perf.start = null;
            }
            if (perf.timing) display.innerText = ((performance.now() - perf.start) / 1000).toFixed(2);
        }

        // 4. PARKING
        window.addTime = (m) => { tSeconds += m * 60; updateParkingUI(); };
        window.toggleParking = () => {
            if (tInterval) { clearInterval(tInterval); tInterval = null; document.getElementById('parking-btn').innerText = "Set_Meter"; }
            else {
                if (tSeconds <= 0) return; tInterval = setInterval(() => { tSeconds--; updateParkingUI(); if(tSeconds === 0) speak("Parking expired."); }, 1000);
                document.getElementById('parking-btn').innerText = "Cancel";
                if(lastPos) { parkedPos = lastPos; activateNavBtn(); }
            }
        };
        window.findMyCar = () => { if(parkedPos) window.open(`https://www.google.com/maps/search/?api=1&query=$1{parkedPos.lat},${parkedPos.lng}`, '_blank'); };
        function activateNavBtn() { const b = document.getElementById('nav-to-car'); b.classList.remove('opacity-20', 'pointer-events-none'); b.classList.add('glow-accent'); }

        // 5. MAINTENANCE
        function updateMaintenance(miles) {
            odo += miles;
            const life = Math.max(0, 100 - (odo / 5000 * 100)).toFixed(0);
            document.getElementById('oil-pct').innerText = `${life}%`;
            document.getElementById('oil-bar').style.width = `${life}%`;
            if (life < 10) document.getElementById('find-mechanic').classList.remove('hidden');
        }
        window.findNearestRepair = () => { if(lastPos) window.open(`https://www.google.com/maps/search/?api=1&query=$2{lastPos.lat},${lastPos.lng}&query=car+repair`, '_blank'); };

        // 6. VISION & TELEMETRY
        async function startDashcam() { try { const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }); document.getElementById('dashcam-feed').srcObject = s; } catch(e) {} }
        function speak(t) { const m = new SpeechSynthesisUtterance(t); m.rate = 1.1; window.speechSynthesis.speak(m); }

        navigator.geolocation.watchPosition((pos) => {
            let mph = Math.round((pos.coords.speed || 0) * 2.237);
            if (mph < 2) mph = 0;
            document.getElementById('speed-val').innerText = mph.toString().padStart(2, '0');
            handlePerf(mph);
            if (lastPos && mph > 2) updateMaintenance(getDistance(lastPos.lat, lastPos.lng, pos.coords.latitude, pos.coords.longitude));
            lastPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            updateDoc(hudRef, { gps_speed: mph });
        }, null, { enableHighAccuracy: true });

        window.addEventListener("devicemotion", (e) => {
            document.getElementById('lat-g').innerText = (e.accelerationIncludingGravity.x / 9.81).toFixed(2);
            document.getElementById('lon-g').innerText = (e.accelerationIncludingGravity.y / 9.81).toFixed(2);
        });

        function getDistance(la1, lo1, la2, lo2) { const R = 3958.8; const dLa = (la2-la1)*Math.PI/180; const dLo = (lo2-lo1)*Math.PI/180; const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2; return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
        window.calcFuel = () => { const d = document.getElementById('input-dist').value; const cost = (d/document.getElementById('input-mpg').value)*document.getElementById('input-price').value; document.getElementById('fuel-result').innerText = `$${cost.toFixed(2)}`; };
    </script>
</body>
</html>
