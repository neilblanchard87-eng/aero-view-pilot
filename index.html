<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AERO_PILOT_REMOTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glow-cyan { text-shadow: 0 0 20px rgba(0, 240, 255, 0.6); }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-between h-screen p-8">

    <div class="text-center mt-12">
        <h1 class="text-cyan-400 text-[10px] tracking-[0.5em] uppercase mb-2">Satellite_Uplink_Active</h1>
        <div id="speed-display" class="text-8xl font-black glow-cyan">00</div>
        <p class="text-cyan-400/40 text-xs tracking-widest mt-2 uppercase">Current_MPH</p>
    </div>

    <div class="w-full space-y-6 mb-12">
        <button onclick="startMission()" id="btn-start" class="w-full py-6 rounded-3xl bg-cyan-500 text-black font-black uppercase tracking-widest text-sm shadow-[0_0_30px_rgba(6,182,212,0.4)]">
            Initialize_Aero_Link
        </button>
        
        <div class="glass p-6 rounded-[2rem] text-center">
            <div id="status-text" class="text-[9px] text-white/30 uppercase tracking-[0.2em]">Standing_By...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJgr9zdA4j1U-50b9TRfsoqrE3pIxmee4",
            authDomain: "aero-view-alpha.firebaseapp.com",
            projectId: "aero-view-alpha",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const hudRef = doc(db, "settings", "hud_config");

        window.startMission = () => {
            document.getElementById('btn-start').innerHTML = "Mission_Live";
            document.getElementById('btn-start').classList.add('opacity-50');
            
            // 1. GET GPS SPEED
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    // Convert meters per second to MPH (mps * 2.237)
                    let mps = position.coords.speed || 0;
                    let mph = Math.round(mps * 2.237);
                    
                    document.getElementById('speed-display').innerText = mph.toString().padStart(2, '0');
                    updateDoc(hudRef, { gps_speed: mph });
                }, (err) => console.error(err), { enableHighAccuracy: true });
            }

            // 2. GET STEERING TILT
            window.addEventListener("deviceorientation", (event) => {
                let tilt = Math.round(event.gamma); // Left/Right tilt
                updateDoc(hudRef, { steering_tilt: tilt });
            });

            document.getElementById('status-text').innerText = "Streaming_Telemetry_to_Cloud";
        };
    </script>
</body>
</html>
