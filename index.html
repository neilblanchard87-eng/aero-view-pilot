<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AERO-VIEW | Pilot App v1.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at 50% 0%, #1e293b, #000); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .neon-text { text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
        .active-glow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); border-color: rgba(34, 211, 238, 0.6); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">AERO<span class="text-cyan-400">VIEW</span></h1>
                <p class="text-[9px] font-mono text-cyan-400/50 tracking-[0.3em] mt-1">COMMANDER_v1.8</p>
            </div>
            <div id="gps-status" class="text-[10px] font-bold text-red-500 uppercase tracking-tighter">GPS: OFFLINE</div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-5 rounded-[2rem] text-center border-t border-white/10">
                <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Velocity</p>
                <p id="live-speed" class="text-4xl font-black text-cyan-400 neon-text">0</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase">Miles Per Hour</p>
            </div>
            <div class="glass p-5 rounded-[2rem] text-center border-t border-white/10">
                <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Steering</p>
                <p id="live-tilt" class="text-4xl font-black text-white italic">0°</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase">Input Angle</p>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <button id="init-btn" class="w-full py-4 glass border-cyan-400/30 rounded-2xl text-xs font-black tracking-[0.3em] text-cyan-400 active:scale-95 transition-all">
                INITIALIZE SENSOR ARRAY
            </button>
            
            <div class="grid grid-cols-2 gap-3">
                <button id="color-cyan" class="py-4 glass rounded-2xl border-b-2 border-cyan-500 text-[9px] font-black uppercase tracking-widest hover:bg-cyan-500/10">Cyan Signature</button>
                <button id="color-pink" class="py-4 glass rounded-2xl border-b-2 border-pink-500 text-[9px] font-black uppercase tracking-widest hover:bg-pink-500/10">Pink Signature</button>
            </div>

            <div class="glass p-5 rounded-[2rem] flex justify-between items-center">
                <div>
                    <h2 class="text-xs font-black uppercase tracking-tight">Night Specter</h2>
                    <p class="text-[9px] text-gray-500 uppercase mt-1">Enhance Hazard Contrast</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="night-toggle" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-white/5 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-cyan-500 after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white/40 after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
                </label>
            </div>
        </div>

        <div class="glass p-4 rounded-2xl font-mono text-[9px] text-gray-500">
            <div id="console-out" class="space-y-1 h-20 overflow-y-auto">
                <p>> System Readiness: 100%</p>
                <p>> Awaiting Uplink...</p>
            </div>
        </div>

        <p class="text-center text-[8px] text-gray-700 mt-6 tracking-widest uppercase">Build: 2026.03.25.1800</p>
    </div>
