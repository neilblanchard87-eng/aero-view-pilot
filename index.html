<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AeroPilot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .glow-cyan { text-shadow: 0 0 30px rgba(0, 240, 255, 0.4); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .stat-label { font-size: 10px; font-weight: 900; letter-spacing: 0.2em; color: rgba(0, 240, 255, 0.5); text-transform: uppercase; }
        .active-ring { border: 2px solid #00F0FF; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }
    </style>
</head>
<body class="h-screen flex flex-col justify-between p-6">

    <div class="flex justify-between items-center pt-4">
        <div class="flex items-center gap-2">
            <div id="gps-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            <span class="text-[10px] font-bold tracking-widest opacity-40 uppercase">GPS_LINK</span>
        </div>
        <div class="text-[10px] font-bold tracking-widest opacity-40 uppercase" id="current-time">00:00</div>
    </div>

    <div class="flex flex-col items-center">
        <div id="smoothness-ring" class="relative w-72 h-72 rounded-full border-4 border-white/5 flex items-center justify-center transition-colors duration-500">
            <div class="flex flex-col items-center">
                <span id="speed" class="text-9xl font-black glow-cyan leading-none">0</span>
                <span class="stat-label mt-2">MPH</span>
            </div>
            <div id="g-ball" class="absolute w-4 h-4 bg-cyan-400 rounded-full blur-[2px] transition-transform duration-100" style="transform: translate(0,0)"></div>
        </div>
        <div id="status-msg" class="mt-6 text-[10px] font-bold text-cyan-400 tracking-[0.3em] uppercase">Ready_To_Drive</div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="glass-card p-5 rounded-[2rem]">
            <span class="stat-label">Distance</span>
            <div class="text-2xl font-bold mt-1"><span id="trip-dist">0.0</span> <span class="text-xs opacity-30">MI</span></div>
        </div>
        <div class="glass-card p-5 rounded-[2rem]">
            <span class="stat-label">Smoothness</span>
            <div id="smooth-score" class="text-2xl font-bold mt-1 text-green-400">100%</div>
        </div>
    </div>

    <div class="flex gap-4 mb-4">
        <button onclick="markLocation()" class="flex-1 glass-card py-6 rounded-[2rem] active:scale-95 transition-transform flex flex-col items-center justify-center">
            <span class="stat-label !text-white/60">Mark Spot</span>
        </button>
        <button onclick="toggleTrip()" id="trip-btn" class="flex-1 bg-cyan-500 text-black font-black uppercase tracking-widest text-xs py-6 rounded-[2rem] shadow-[0_10px_30px_rgba(6,182,212,0.3)] active:scale-95 transition-all">
            Start Trip
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJgr9zdA4j1U-50b9TRfsoqrE3pIxmee4",
            authDomain: "aero-view-alpha.firebaseapp.com",
            projectId: "aero-view-alpha",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const hudRef = doc(db, "settings", "hud_config");

        let isDriving = false;
        let startCoords = null;
        let totalDist = 0;
        let lastPos = null;
        let smoothness = 100;

        // 1. UPDATE TIME
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // 2. MAIN TELEMETRY LOOP
        window.toggleTrip = () => {
            isDriving = !isDriving;
            const btn = document.getElementById('trip-btn');
            btn.innerText = isDriving ? "End Trip" : "Start Trip";
            btn.style.backgroundColor = isDriving ? "#ff0055" : "#06b6d4";
            document.getElementById('status-msg').innerText = isDriving ? "Trip_In_Progress" : "Trip_Saved";
            
            if (isDriving) {
                totalDist = 0;
                smoothness = 100;
                startTracking();
            } else {
                saveTripToHistory();
            }
        };

        function startTracking() {
            navigator.geolocation.watchPosition((pos) => {
                document.getElementById('gps-indicator').style.backgroundColor = '#22c55e';
                
                let mph = Math.round((pos.coords.speed || 0) * 2.237);
                document.getElementById('speed').innerText = mph;

                // Automatic Parking Detection
                if (mph === 0 && isDriving) {
                    updateDoc(hudRef, { last_parked: { lat: pos.coords.latitude, lng: pos.coords.longitude, time: new Date().toISOString() } });
                }

                // Distance Calculation
                if (lastPos && mph > 1) {
                    const d = getDistance(lastPos.lat, lastPos.lng, pos.coords.latitude, pos.coords.longitude);
                    totalDist += d;
                    document.getElementById('trip-dist').innerText = totalDist.toFixed(1);
                }
                lastPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };

                // Sync to Cloud
                updateDoc(hudRef, { gps_speed: mph, steering_tilt: 0 });
            }, null, { enableHighAccuracy: true });
        }

        // 3. SMOOTHNESS & G-FORCE
        window.addEventListener("devicemotion", (e) => {
            const x = e.accelerationIncludingGravity.x || 0;
            const y = e.accelerationIncludingGravity.y || 0;
            
            // Move the G-Ball visually
            const ball = document.getElementById('g-ball');
            ball.style.transform = `translate(${-x * 10}px, ${y * 10}px)`;

            // Smoothness Logic: Penalty for high G-moves
            const combinedG = Math.abs(x) + Math.abs(y);
            if (combinedG > 15) {
                smoothness = Math.max(0, smoothness - 1);
                document.getElementById('smooth-score').innerText = `${smoothness}%`;
                document.getElementById('smooth-score').style.color = smoothness < 70 ? '#ff0055' : '#22c55e';
                
                // Haptic feedback for harsh moves
                if ("vibrate" in navigator) navigator.vibrate(50);
            }
        });

        // 4. UTILS
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 3958.8; // Miles
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.markLocation = () => {
            if (lastPos) {
                addDoc(collection(db, "road_notes"), {
                    coords: lastPos,
                    timestamp: new Date().toISOString(),
                    type: "User_Marked"
                });
                if ("vibrate" in navigator) navigator.vibrate([100, 50, 100]);
                alert("Location Pinned to Cloud");
            }
        };

        async function saveTripToHistory() {
            await addDoc(collection(db, "trip_history"), {
                distance: totalDist.toFixed(2),
                smoothness: smoothness,
                date: new Date().toISOString()
            });
        }
    </script>
</body>
</html>
