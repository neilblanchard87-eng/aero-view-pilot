<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AERO-VIEW | Pilot App v1.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at 50% 0%, #1e293b, #000); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .active-tab { background: #22d3ee; color: #000; }
        .neon-text { text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">AERO<span class="text-cyan-400">VIEW</span></h1>
                <p class="text-[9px] font-mono text-cyan-400/50 tracking-[0.3em] mt-1">SENSORY_LINK_v1.3</p>
            </div>
            <div id="gps-status" class="text-[10px] font-bold text-red-500 uppercase">GPS: OFFLINE</div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass p-6 rounded-[2rem] text-center border-t border-white/10">
                <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Live Velocity</p>
                <p id="live-speed" class="text-4xl font-black text-cyan-400 neon-text">0</p>
                <p class="text-[10px] font-bold text-gray-400">MPH</p>
            </div>
            <div class="glass p-6 rounded-[2rem] text-center border-t border-white/10">
                <p class="text-[9px] text-gray-500 uppercase tracking-widest mb-1">Heading</p>
                <p id="live-heading" class="text-4xl font-black text-white italic">---°</p>
                <p id="cardinal-dir" class="text-[10px] font-bold text-gray-400 uppercase">Stationary</p>
            </div>
        </div>

        <div class="space-y-4 mb-10">
            <button onclick="requestTelemetry()" id="init-btn" class="w-full py-5 glass border-cyan-400/30 rounded-2xl text-xs font-black tracking-[0.3em] text-cyan-400 active:scale-95 transition-all">
                INITIALIZE MISSION LINK
            </button>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="updateColor('#00FFFF')" class="py-4 glass rounded-2xl border-b-2 border-cyan-500 text-[10px] font-black">CYAN MODE</button>
                <button onclick="updateColor('#FF007F')" class="py-4 glass rounded-2xl border-b-2 border-pink-500 text-[10px] font-black">PINK MODE</button>
            </div>
        </div>

        <div class="glass p-4 rounded-2xl font-mono text-[10px] text-gray-500">
            <p class="text-cyan-400 mb-2 uppercase tracking-widest border-b border-white/5 pb-1">System Console</p>
            <div id="console-out" class="space-y-1 h-20 overflow-y-auto">
                <p>> System Idle. Awaiting initialization...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJgr9zdA4j1U-50b9TRfsoqrE3pIxmee4",
            authDomain: "aero-view-alpha.firebaseapp.com",
            projectId: "aero-view-alpha",
            storageBucket: "aero-view-alpha.firebasestorage.app",
            messagingSenderId: "239183849355",
            appId: "1:239183849355:web:5d19770237b2565148718e",
            measurementId: "G-E3CNWW9JJB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const log = (msg) => {
            const out = document.getElementById('console-out');
            out.innerHTML += `<p>> ${msg}</p>`;
            out.scrollTop = out.scrollHeight;
        };

        window.updateColor = async (hex) => {
            await updateDoc(doc(db, "settings", "hud_config"), { color: hex });
            log(`HUD Color Updated: ${hex}`);
        };

        window.requestTelemetry = () => {
            if (!("geolocation" in navigator)) {
                log("ERROR: Geolocation not supported by this browser.");
                return;
            }

            log("Requesting GPS Permissions...");
            const statusEl = document.getElementById('gps-status');
            
            // High-Accuracy Options for 2026 Mobile OS
            const options = {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            };

            navigator.geolocation.watchPosition(async (position) => {
                statusEl.innerText = "GPS: ACTIVE";
                statusEl.className = "text-[10px] font-bold text-cyan-400 uppercase";
                
                // Convert m/s to MPH. Note: speed is often null if stationary.
                const rawSpeed = position.coords.speed || 0;
                const speedMPH = Math.round(rawSpeed * 2.23694);
                const heading = position.coords.heading || 0;

                document.getElementById('live-speed').innerText = speedMPH;
                document.getElementById('live-heading').innerText = `${Math.round(heading)}°`;
                
                // Determine Cardinal Direction
                const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                const cardinal = directions[Math.round(heading / 45) % 8];
                document.getElementById('cardinal-dir').innerText = rawSpeed > 0.5 ? cardinal : "Stationary";

                // Sync to Cloud
                try {
                    await updateDoc(doc(db, "settings", "hud_config"), { 
                        gps_speed: speedMPH,
                        heading: heading
                    });
                } catch (e) { log("Firebase Sync Failed."); }

            }, (error) => {
                let msg = "Unknown Error";
                if(error.code == 1) msg = "PERMISSION DENIED";
                if(error.code == 2) msg = "POSITION UNAVAILABLE (Searching...)";
                if(error.code == 3) msg = "TIMEOUT (Poor Signal)";
                
                statusEl.innerText = `GPS: ${msg}`;
                statusEl.className = "text-[10px] font-bold text-red-500 uppercase";
                log(`GPS Error: ${msg}`);
            }, options);

            document.getElementById('init-btn').innerText = "LINK ESTABLISHED";
            document.getElementById('init-btn').className = "w-full py-5 glass border-green-500/30 rounded-2xl text-xs font
