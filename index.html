<!DOCTYPE html>
<html lang="en" data-theme="cyan">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aero-Pilot OS v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00F0FF; --glow: rgba(0, 240, 255, 0.4); }
        [data-theme="stealth"] { --accent: #FF0000; --glow: rgba(255, 0, 0, 0.4); }

        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; transition: background 0.5s ease; }
        .glow-accent { text-shadow: 0 0 25px var(--glow); color: var(--accent) !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .nav-btn { opacity: 0.3; font-size: 7px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; transition: 0.3s; }
        .accent-border { border-color: var(--accent); }
        .accent-bg { background-color: var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col justify-between relative">

    <div class="p-4 flex justify-between items-center z-50 bg-black/50 backdrop-blur-md border-b border-white/5">
        <div class="flex flex-col">
            <span class="text-[8px] font-black tracking-[0.4em] glow-accent uppercase italic">Aero_Tactical_v6.0</span>
            <span id="weather-text" class="text-[9px] font-bold text-white/40 uppercase">Scanning_Environment...</span>
        </div>
        <button onclick="toggleStealth()" class="glass-panel px-4 py-2 rounded-full border accent-border flex items-center gap-2 active:scale-90 transition-all">
            <div class="w-1.5 h-1.5 rounded-full accent-bg"></div>
            <span class="text-[8px] font-black tracking-widest uppercase">Stealth_Mode</span>
        </button>
    </div>

    <main class="flex-1 overflow-y-auto px-6 pb-28">
        
        <section id="page-drive" class="space-y-6 pt-4 text-center">
            <div class="py-12">
                <div class="text-[110px] font-black italic leading-none glow-accent" id="speed-val">00</div>
                <div class="text-[9px] font-black tracking-[0.5em] opacity-40 uppercase">MPH</div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-5 rounded-[2rem]">
                    <span class="text-[8px] font-black text-white/20 uppercase tracking-widest">Visibility</span>
                    <div id="vis-val" class="text-xl font-bold italic mt-1 text-green-400">EXCELLENT</div>
                </div>
                <div class="glass-panel p-5 rounded-[2rem]">
                    <span class="text-[8px] font-black text-white/20 uppercase tracking-widest">Road_Temp</span>
                    <div class="text-xl font-bold italic mt-1">72°F</div>
                </div>
            </div>
        </section>

        <section id="page-summary" class="hidden space-y-4 pt-6">
            <h2 class="text-xl font-black italic tracking-tighter uppercase mb-4">Daily_Briefing</h2>
            <div class="p-6 rounded-[2rem] glass-panel border-t-2 accent-border space-y-6">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-white/40 uppercase tracking-widest">Session_Dist</span>
                    <span id="sum-dist" class="text-xl font-black italic">0.00 MI</span>
                </div>
                <div class="flex justify-between items-center border-t border-white/5 pt-4">
                    <span class="text-[10px] font-bold text-white/40 uppercase tracking-widest">Fuel_Impact</span>
                    <span id="sum-cost" class="text-xl font-black italic glow-accent">$0.00</span>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full h-20 glass-panel border-t border-white/10 flex justify-around items-center px-4 pb-4 z-50">
        <button onclick="showPage('drive')" id="nav-drive" class="nav-btn flex flex-col items-center gap-1"><span>Drive</span></button>
        <button onclick="showPage('summary')" id="nav-summary" class="nav-btn flex flex-col items-center gap-1"><span>Summary</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBJgr9zdA4j1U-50b9TRfsoqrE3pIxmee4", authDomain: "aero-view-alpha.firebaseapp.com", projectId: "aero-view-alpha" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const hudRef = doc(db, "settings", "hud_config");

        let stats = { dist: 0, costPerMile: 0.18 };
        let lastPos = null;

        // 1. STEALTH MODE TOGGLE
        window.toggleStealth = () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'cyan' ? 'stealth' : 'cyan';
            document.documentElement.setAttribute('data-theme', next);
            
            if ("vibrate" in navigator) navigator.vibrate(50);
            speak(`Switching to ${next} mode.`);
            
            // Update Laptop HUD theme simultaneously
            updateDoc(hudRef, { theme: next });
        };

        // 2. WEATHER INTELLIGENCE (Mock Logic)
        function checkWeather() {
            const conditions = ["Clear Skies", "Light Rain", "High Winds", "Overcast"];
            const selected = conditions[Math.floor(Math.random() * conditions.length)];
            
            document.getElementById('weather-text').innerText = `Road_Status: ${selected}`;
            
            if (selected === "Light Rain") {
                document.getElementById('vis-val').innerText = "CAUTION";
                document.getElementById('vis-val').className = "text-xl font-bold italic mt-1 text-yellow-500";
                speak(`Weather alert: ${selected} detected. Traction may be limited.`);
            } else {
                speak(`All systems nominal. Conditions are ${selected}.`);
            }
        }

        // 3. VOICE ENGINE
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.0;
            msg.pitch = 0.8; // Deep, tactical voice
            window.speechSynthesis.speak(msg);
        }

        // 4. NAVIGATION
        window.showPage = (id) => {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.style.opacity = '0.3');
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.getElementById(`nav-${id}`).style.opacity = '1';
        };
        showPage('drive');

        // 5. TELEMETRY
        navigator.geolocation.watchPosition((pos) => {
            let mph = Math.round((pos.coords.speed || 0) * 2.237);
            if (mph < 2.5) mph = 0;
            document.getElementById('speed-val').innerText = mph.toString().padStart(2, '0');

            if (lastPos && mph > 2) {
                const d = getDistance(lastPos.lat, lastPos.lng, pos.coords.latitude, pos.coords.longitude);
                stats.dist += d;
                document.getElementById('sum-dist').innerText = `${stats.dist.toFixed(2)} MI`;
                document.getElementById('sum-cost').innerText = `$${(stats.dist * stats.costPerMile).toFixed(2)}`;
            }

            if (!lastPos) checkWeather(); // Check weather on first GPS lock
            lastPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            updateDoc(hudRef, { gps_speed: mph });
        }, null, { enableHighAccuracy: true });

        function getDistance(la1, lo1, la2, lo2) { const R = 3958.8; const dLa = (la2-la1)*Math.PI/180; const dLo = (lo2-lo1)*Math.PI/180; const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2; return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
    </script>
</body>
</html>
