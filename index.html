<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aero-Pilot OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glow-cyan { text-shadow: 0 0 25px rgba(0, 240, 255, 0.4); }
        .glow-amber { text-shadow: 0 0 25px rgba(245, 158, 11, 0.4); color: #f59e0b !important; }
        .glow-red { text-shadow: 0 0 25px rgba(239, 68, 68, 0.4); color: #ef4444 !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .nav-btn { opacity: 0.3; transition: all 0.3s; }
        .hidden { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col justify-between relative">

    <div class="p-6 flex justify-between items-center z-50 bg-black/50 backdrop-blur-md">
        <div class="flex flex-col">
            <span class="text-[9px] font-black tracking-[0.3em] text-cyan-400/50 uppercase">Aero_Pilot_OS</span>
            <span id="header-status" class="text-xs font-bold tracking-tight">System_Ready</span>
        </div>
        <div id="gps-status" class="glass-panel px-3 py-1 rounded-full flex items-center gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
            <span class="text-[9px] font-black tracking-widest uppercase">GPS_Link</span>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto px-6 pb-28">
        
        <section id="page-drive" class="space-y-6 pt-4">
            <div class="flex flex-col items-center justify-center py-10">
                <div class="text-[120px] font-black italic leading-none glow-cyan" id="speed-val">00</div>
                <div class="text-[10px] font-black tracking-[0.5em] text-cyan-400/40 uppercase">Velocity_MPH</div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-panel p-5 rounded-[2rem] text-center">
                    <span class="text-[9px] font-black text-white/20 tracking-widest uppercase">Trip_Dist</span>
                    <div class="text-2xl font-bold mt-1" id="dist-val">0.0</div>
                </div>
                <div class="glass-panel p-5 rounded-[2rem] text-center">
                    <span class="text-[9px] font-black text-white/20 tracking-widest uppercase">Smoothness</span>
                    <div class="text-2xl font-bold mt-1 text-green-400">100%</div>
                </div>
            </div>
        </section>

        <section id="page-parking" class="hidden space-y-6 pt-6 text-center">
            <h2 class="text-2xl font-black italic tracking-tighter">Parking_Enforcement</h2>
            
            <div class="relative w-64 h-64 mx-auto flex items-center justify-center mb-4">
                <svg class="absolute inset-0 w-full h-full rotate-[-90deg]">
                    <circle cx="128" cy="128" r="110" stroke="currentColor" stroke-width="4" fill="transparent" class="text-white/5" />
                    <circle id="timer-ring" cx="128" cy="128" r="110" stroke="currentColor" stroke-width="6" fill="transparent" 
                            class="text-cyan-400 transition-all duration-1000" stroke-dasharray="691" stroke-dashoffset="0" />
                </svg>
                <div>
                    <div id="timer-display" class="text-6xl font-black italic glow-cyan">00:00</div>
                    <div id="timer-label" class="text-[9px] font-black tracking-[0.3em] opacity-40 uppercase mt-2">Remaining</div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button onclick="addTime(15)" class="glass-panel py-4 rounded-2xl font-bold text-xs">+15m</button>
                <button onclick="addTime(30)" class="glass-panel py-4 rounded-2xl font-bold text-xs">+30m</button>
                <button onclick="addTime(60)" class="glass-panel py-4 rounded-2xl font-bold text-xs">+1h</button>
            </div>

            <div class="flex gap-3">
                <button onclick="resetTimer()" class="flex-1 glass-panel py-5 rounded-3xl font-black text-[10px] tracking-widest opacity-40 uppercase">Reset</button>
                <button id="parking-btn" onclick="toggleParking()" class="flex-[2] bg-cyan-500 text-black py-5 rounded-3xl font-black text-[10px] tracking-widest uppercase shadow-lg shadow-cyan-500/20">Set_Meter</button>
            </div>
        </section>

        <section id="page-wallet" class="hidden space-y-4 pt-6">
            <h2 class="text-2xl font-black italic tracking-tighter mb-4">Digital_Glovebox</h2>
            <div class="glass-panel p-6 rounded-[2rem] border-l-4 border-cyan-500">
                <span class="text-[9px] font-black text-cyan-400 tracking-widest uppercase">Insurance</span>
                <div class="mt-1 font-bold">Policy #AERO-9920-X</div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full h-24 glass-panel border-t border-white/10 flex justify-around items-center px-6 pb-4 z-50">
        <button onclick="showPage('drive')" id="nav-drive" class="nav-btn flex flex-col items-center gap-1">
            <span class="text-[10px] font-black uppercase tracking-tighter">Drive</span>
        </button>
        <button onclick="showPage('parking')" id="nav-parking" class="nav-btn flex flex-col items-center gap-1">
            <span class="text-[10px] font-black uppercase tracking-tighter">Parking</span>
        </button>
        <button onclick="showPage('wallet')" id="nav-wallet" class="nav-btn flex flex-col items-center gap-1">
            <span class="text-[10px] font-black uppercase tracking-tighter">Wallet</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJgr9zdA4j1U-50b9TRfsoqrE3pIxmee4",
            authDomain: "aero-view-alpha.firebaseapp.com",
            projectId: "aero-view-alpha",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const hudRef = doc(db, "settings", "hud_config");

        let timerSeconds = 0;
        let timerInterval = null;
        let isTimerActive = false;
        let lastCoords = null;

        // 1. NAVIGATION
        window.showPage = (id) => {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.style.opacity = '0.3');
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.getElementById(`nav-${id}`).style.opacity = '1';
            document.getElementById(`nav-${id}`).style.color = '#00F0FF';
        };
        showPage('drive');

        // 2. PARKING TIMER LOGIC
        window.addTime = (mins) => {
            timerSeconds += mins * 60;
            updateTimerDisplay();
        };

        window.resetTimer = () => {
            clearInterval(timerInterval);
            timerSeconds = 0;
            isTimerActive = false;
            updateTimerDisplay();
            document.getElementById('parking-btn').innerText = "Set_Meter";
        };

        window.toggleParking = () => {
            if (isTimerActive) {
                resetTimer();
            } else {
                if (timerSeconds <= 0) return alert("Select Time First");
                isTimerActive = true;
                document.getElementById('parking-btn').innerText = "End_Meter";
                
                // SAVE PARKING SPOT
                if (lastCoords) {
                    updateDoc(hudRef, { last_parked: { ...lastCoords, time: new Date().toISOString() } });
                }

                timerInterval = setInterval(() => {
                    timerSeconds--;
                    updateTimerDisplay();
                    
                    if (timerSeconds === 300) { // 5 Minute Warning
                        if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);
                    }
                    
                    if (timerSeconds === 0) {
                        document.getElementById('timer-label').innerText = "Expired_Overtime";
                        if ("vibrate" in navigator) navigator.vibrate([500, 200, 500]);
                    }
                }, 1000);
            }
        };

        function updateTimerDisplay() {
            const display = document.getElementById('timer-display');
            const ring = document.getElementById('timer-ring');
            
            const isNegative = timerSeconds < 0;
            const absSecs = Math.abs(timerSeconds);
            const mins = Math.floor(absSecs / 60);
            const secs = absSecs % 60;
            
            display.innerText = `${isNegative ? '-' : ''}${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            
            // UI Color Scaling
            if (isNegative) {
                display.className = "text-6xl font-black italic glow-red";
                ring.style.color = "#ef4444";
            } else if (timerSeconds < 300) {
                display.className = "text-6xl font-black italic glow-amber";
                ring.style.color = "#f59e0b";
            } else {
                display.className = "text-6xl font-black italic glow-cyan";
                ring.style.color = "#00F0FF";
            }
        }

        // 3. TELEMETRY
        navigator.geolocation.watchPosition((pos) => {
            let rawMph = (pos.coords.speed || 0) * 2.237;
            let mph = rawMph < 2.5 ? 0 : Math.round(rawMph);
            document.getElementById('speed-val').innerText = mph.toString().padStart(2, '0');
            lastCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            updateDoc(hudRef, { gps_speed: mph });
        }, null, { enableHighAccuracy: true });

    </script>
</body>
</html>
